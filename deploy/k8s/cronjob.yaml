apiVersion: batch/v1
kind: CronJob
metadata:
  name: gojob-sync
  namespace: default
spec:
  # Schedule: every 10 minutes
  # Format: minute hour day month day-of-week
  # */10 * * * * = every 10 minutes
  schedule: "*/10 * * * *"
  
  # Keep last 3 successful and failed jobs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  
  # Suspend this CronJob if needed (set to false to enable)
  suspend: false
  
  jobTemplate:
    spec:
      # Timeout for the job
      backoffLimit: 2
      
      template:
        metadata:
          labels:
            app: gojob-sync
        spec:
          serviceAccountName: default
          restartPolicy: OnFailure
          
          containers:
          - name: gojob
            image: gojob:latest
            imagePullPolicy: IfNotPresent
            
            command:
            - /usr/local/bin/gojob
            - sync
            - --verbose
            
            env:
            # Sync endpoint URL
            - name: SYNC_URL
              valueFrom:
                configMapKeyRef:
                  name: gojob-config
                  key: sync-url
            
            # API key for authentication
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: gojob-secrets
                  key: api-key
            
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
            
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gojob-config
  namespace: default
data:
  # Update with your actual sync endpoint URL
  sync-url: "<your-sync-url>"

---
apiVersion: v1
kind: Secret
metadata:
  name: gojob-secrets
  namespace: default
type: Opaque
stringData:
  # Update with your actual API key
  api-key: "change-me-with-real-key"
