apiVersion: batch/v1
kind: CronJob
metadata:
  name: gojob-sync
  namespace: default
spec:
  # Schedule: every 10 minutes
  # Format: minute hour day month day-of-week
  # */10 * * * * = every 10 minutes
  schedule: "*/10 * * * *"
  
  # Keep last 3 successful and failed jobs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  
  # Suspend this CronJob if needed (set to false to enable)
  suspend: false
  
  jobTemplate:
    spec:
      # Timeout for the job
      backoffLimit: 2
      
      template:
        metadata:
          labels:
            app: gojob-sync
        spec:
          serviceAccountName: default
          restartPolicy: OnFailure
          
          containers:
          - name: gojob
            image: gojob:latest
            imagePullPolicy: IfNotPresent
            
            command:
            - /usr/local/bin/gojob
            - sync
            - --verbose
            
            envFrom:
            - secretRef:
                name: gojob-env
            
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 128Mi
            
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              runAsNonRoot: true
              runAsUser: 1000

---
apiVersion: v1
kind: Secret
metadata:
  name: gojob-env
  namespace: default
type: Opaque
stringData:
  # Update with your actual sync endpoint URL
  SYNC_URL: "<your-sync-url>"
  # Update with your actual API key
  API_KEY: "change-me-with-real-key"
