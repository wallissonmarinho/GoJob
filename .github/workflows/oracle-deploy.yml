# Deploy na VM Oracle (k3s): push em main — build/push GHCR + SSH aplica **CronJob**
# no cluster k3s, Secret `gojob-env` a partir de **Variables** e **Secrets**.
#
# Environment **prd** — **Variables** (`vars.*`) — valores não-sensíveis:
#   OCI_VM_HOST, OCI_VM_USER, OCI_DEPLOY_ROOT, SYNC_URL, GOJOB_ENV_B64
#
# **Secrets** obrigatórios:
#   OCI_SSH_PRIVATE_KEY — chave privada SSH para conectar na VM
#   (opcionalmente) API_KEY — se não usar GOJOB_ENV_B64
#
# Na VM: o user SSH precisa de **kubeconfig do k3s** configurado.
#
name: oracle-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: oracle-deploy-gojob-${{ github.ref }}
  cancel-in-progress: true

env:
  GOJOB_IMAGE_TAG: main

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version-file: go.mod
          cache: false

      - name: go vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ampere (k3s) é arm64; runner é amd64. Sem arm64 → ImagePullBackOff.
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.owner }}/gojob:${{ env.GOJOB_IMAGE_TAG }}
            ghcr.io/${{ steps.ghcr.outputs.owner }}/gojob:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: prd
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: GHCR owner (lowercase)
        id: ghcr
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Stamp container image in k3s manifest (CronJob)
        run: |
          set -euo pipefail
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          IMG="ghcr.io/${OWNER}/gojob:${{ github.sha }}"
          sed -i "s|image: gojob:latest|image: ${IMG}|g" deploy/k8s/cronjob.yaml

      # Tar no workspace (caminho relativo)
      - name: Pack k8s manifests
        run: |
          set -euo pipefail
          test -d deploy/k8s
          tar czf gojob-k8s.tgz -C deploy/k8s .
          ls -la gojob-k8s.tgz

      - name: Copy k8s bundle to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          username: ${{ vars.OCI_VM_USER || secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          source: gojob-k8s.tgz
          target: /tmp/

      - name: Deploy GoJob on Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          OCI_DEPLOY_ROOT: ${{ vars.OCI_DEPLOY_ROOT || secrets.OCI_DEPLOY_ROOT }}
          GOJOB_GHCR_OWNER: ${{ steps.ghcr.outputs.owner }}
          GOJOB_IMAGE_TAG: main
          SYNC_URL: ${{ vars.SYNC_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          GOJOB_ENV_B64: ${{ vars.GOJOB_ENV_B64 }}
        with:
          host: ${{ vars.OCI_VM_HOST || secrets.OCI_VM_HOST }}
          username: ${{ vars.OCI_VM_USER || secrets.OCI_VM_USER }}
          key: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          command_timeout: 20m
          envs: OCI_DEPLOY_ROOT,GOJOB_GHCR_OWNER,GOJOB_IMAGE_TAG,SYNC_URL,API_KEY,GOJOB_ENV_B64
          script_stop: true
          script: |
            set -euo pipefail
            ROOT="${OCI_DEPLOY_ROOT:-/opt/go}"
            export GOJOB_GHCR_OWNER="${GOJOB_GHCR_OWNER}"
            export GOJOB_IMAGE_TAG="${GOJOB_IMAGE_TAG:-main}"
            ORACLE_DIR="${ROOT}/deploy/oracle"
            DEPLOY_ENV="${ORACLE_DIR}/.env.gojob.deploy"
            mkdir -p "${ORACLE_DIR}"
            K8S_TAR="${GOJOB_K8S_TARBALL:-/tmp/gojob-k8s.tgz}"
            if [ ! -f "${K8S_TAR}" ]; then
              echo "Falta ${K8S_TAR}" >&2
              exit 1
            fi
            mkdir -p "${ROOT}/deploy/k8s"
            tar xzf "${K8S_TAR}" -C "${ROOT}/deploy/k8s"
            rm -f "${K8S_TAR}"
            K8S_DIR="${ROOT}/deploy/k8s"
            command -v kubectl >/dev/null 2>&1 || { echo "kubectl não está no PATH" >&2; exit 1; }
            if [ -z "${KUBECONFIG:-}" ]; then
              for f in /etc/rancher/k3s/k3s.yaml "${HOME}/.kube/config"; do
                if [ -r "$f" ]; then
                  export KUBECONFIG="$f"
                  break
                fi
              done
            fi
            if [ -z "${KUBECONFIG:-}" ] || ! kubectl cluster-info --request-timeout=10s >/dev/null 2>&1; then
              echo "kubectl sem API do k3s" >&2
              exit 1
            fi
            umask 077
            : > "${DEPLOY_ENV}"
            write_kv() {
              _k="$1"
              _v="$2"
              [ -n "${_v}" ] || return 0
              printf '%s=%s\n' "${_k}" "${_v}" >> "${DEPLOY_ENV}"
            }
            write_kv SYNC_URL "${SYNC_URL:-}"
            write_kv API_KEY "${API_KEY:-}"
            if [ -n "${GOJOB_ENV_B64:-}" ]; then
              printf '%s' "${GOJOB_ENV_B64}" | base64 -d >> "${DEPLOY_ENV}" || { echo "GOJOB_ENV_B64: base64 decode failed" >&2; exit 1; }
              printf '\n' >> "${DEPLOY_ENV}"
            fi
            chmod 600 "${DEPLOY_ENV}" || true
            kubectl apply -f "${K8S_DIR}/cronjob.yaml"
            kubectl -n default create secret generic gojob-env \
              --from-env-file="${DEPLOY_ENV}" \
              --dry-run=client -o yaml | kubectl apply -f -
            kubectl rollout status cronjob/gojob-sync -n default --timeout=300s || true
            echo "OK: k3s — CronJob gojob-sync (namespace default). Imagem ghcr.io/${GOJOB_GHCR_OWNER}/gojob:${{ github.sha }}"
